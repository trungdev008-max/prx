<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>🌸 FF PROXY</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
    body {
      background: linear-gradient(145deg, #fce4ec, #f8e8ff, #e8f5e9);
      font-family: 'Quicksand', 'Segoe UI', sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      position:relative;
      overflow:hidden;
    }
    .cute-bg {
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }
    .cute-bg .bubble {
      position:absolute;
      border-radius:50%;
      opacity:0.15;
      animation: floatBubble 12s infinite ease-in-out;
    }
    .bubble:nth-child(1) { width:180px; height:180px; background:#ffb3c6; top:-30px; left:-40px; animation-delay:0s; }
    .bubble:nth-child(2) { width:140px; height:140px; background:#b8e0d2; bottom:-20px; right:-30px; animation-delay:-3s; }
    .bubble:nth-child(3) { width:100px; height:100px; background:#d4b8e0; top:40%; right:10%; animation-delay:-6s; }
    .bubble:nth-child(4) { width:70px; height:70px; background:#f9e6b3; bottom:20%; left:5%; animation-delay:-9s; }
    .bubble:nth-child(5) { width:50px; height:50px; background:#ffb3b3; top:15%; right:20%; animation-delay:-2s; }

    @keyframes floatBubble {
      0%,100% { transform:translate(0,0) scale(1) rotate(0deg); }
      25% { transform:translate(30px,-40px) scale(1.05) rotate(5deg); }
      50% { transform:translate(-20px,-20px) scale(0.95) rotate(-5deg); }
      75% { transform:translate(20px,30px) scale(1.02) rotate(3deg); }
    }

    .container {
      position:relative;
      z-index:1;
      width:100%;
      max-width:460px;
      background:rgba(255,255,255,0.75);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border-radius:32px;
      padding:28px 24px;
      box-shadow: 0 20px 60px rgba(255,105,135,0.15), 0 8px 24px rgba(0,0,0,0.04);
      border:1px solid rgba(255,255,255,0.5);
    }

    .header {
      text-align:center;
      margin-bottom:20px;
    }
    .header .avatar {
      width:80px;
      height:80px;
      border-radius:50%;
      display:block;
      margin:0 auto 10px;
      object-fit:cover;
      border:3px solid #f8bbd0;
      box-shadow:0 8px 24px rgba(255,105,135,0.2);
      animation: wiggle 3s infinite ease-in-out;
    }
    @keyframes wiggle {
      0%,100% { transform:rotate(-3deg) scale(1); }
      50% { transform:rotate(3deg) scale(1.05); }
    }
    .header .title {
      font-size:26px;
      font-weight:700;
      color:#6a1b4d;
      letter-spacing:1px;
      margin-top:4px;
    }
    .header .title span { background:linear-gradient(135deg,#f06292,#ba68c8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .header .sub {
      font-size:14px;
      color:#ad7a8b;
      font-weight:600;
      letter-spacing:0.5px;
      margin-top:2px;
    }
    .header .sub span { color:#f06292; -webkit-text-fill-color:#f06292; }

    .divider {
      width:60px;
      height:3px;
      background:linear-gradient(90deg,#f8bbd0,#ce93d8);
      border-radius:4px;
      margin:10px auto 16px;
    }

    .info-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px 12px;
      background:rgba(255,240,245,0.5);
      border-radius:16px;
      padding:12px 16px;
      margin-bottom:14px;
      border:1px solid rgba(255,182,193,0.3);
    }
    .info-grid .ig-label {
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:0.5px;
      color:#b07a8a;
      font-weight:600;
    }
    .info-grid .ig-value {
      font-weight:700;
      color:#4a1a2e;
      word-break:break-all;
      font-size:12px;
      background:rgba(255,255,255,0.3);
      padding:2px 8px;
      border-radius:20px;
      display:inline-block;
    }

    .note-box {
      background:rgba(255,215,215,0.25);
      border-radius:12px;
      padding:8px 14px;
      margin-bottom:16px;
      font-size:12px;
      color:#7a4a5a;
      border:1px dashed #f8bbd0;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .note-box .icon { font-size:16px; }

    .field {
      margin-bottom:14px;
    }
    .field input {
      width:100%;
      padding:14px 18px;
      background:rgba(255,255,255,0.7);
      border:2px solid #f8bbd0;
      border-radius:20px;
      color:#3d1a2b;
      font-size:15px;
      font-family:'Quicksand',sans-serif;
      outline:none;
      transition:0.25s;
      font-weight:600;
    }
    .field input:focus {
      border-color:#ce93d8;
      box-shadow:0 0 0 6px rgba(206,147,216,0.15);
      background:#fff;
    }
    .field input::placeholder { color:#c9a0b0; font-weight:400; opacity:0.7; }

    .row {
      display:flex;
      gap:10px;
    }
    .btn {
      flex:1;
      padding:14px;
      border:none;
      border-radius:24px;
      font-size:15px;
      font-weight:700;
      font-family:'Quicksand',sans-serif;
      cursor:pointer;
      transition:0.2s;
      text-transform:uppercase;
      letter-spacing:1px;
      background:linear-gradient(135deg,#f06292,#ec407a);
      color:#fff;
      box-shadow:0 6px 20px rgba(236,64,122,0.25);
    }
    .btn:active { transform:scale(0.96); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .btn-clear {
      min-width:50px;
      flex:0 0 50px;
      background:rgba(255,200,200,0.3);
      color:#d46a7a;
      box-shadow:none;
      border:1px solid #f8bbd0;
      font-size:18px;
      padding:14px 0;
    }
    .btn-clear:hover { background:rgba(255,180,180,0.5); }

    .status-panel {
      display:none;
      margin-top:18px;
      background:rgba(255,240,245,0.5);
      border-radius:20px;
      padding:16px 18px;
      border:1px solid rgba(206,147,216,0.2);
    }
    .status-panel .stat-title {
      font-weight:700;
      font-size:15px;
      color:#6a1b4d;
      margin-bottom:8px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .status-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:4px 14px;
      font-size:13px;
    }
    .status-grid .sg-label { color:#b07a8a; font-weight:600; }
    .status-grid .sg-value { color:#3d1a2b; font-weight:700; }
    #statusIpMsg { font-size:12px; margin-bottom:8px; color:#d48a5a; font-weight:600; }

    .admin-box {
      margin-top:16px;
      padding-top:14px;
      border-top:2px dashed rgba(248,187,208,0.4);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .admin-box .admin-title {
      font-size:13px;
      font-weight:700;
      color:#ba68c8;
    }
    .admin-btn {
      padding:6px 20px;
      background:linear-gradient(135deg,#ce93d8,#ba68c8);
      color:#fff;
      font-weight:700;
      text-decoration:none;
      border-radius:30px;
      font-size:13px;
      font-family:'Quicksand',sans-serif;
      box-shadow:0 4px 14px rgba(186,104,200,0.25);
      transition:0.2s;
    }
    .admin-btn:hover { transform:scale(1.04); box-shadow:0 6px 24px rgba(186,104,200,0.35); }

    .footer {
      text-align:center;
      margin-top:16px;
      font-size:11px;
      color:#c9a0b0;
      font-weight:600;
      letter-spacing:0.5px;
    }

    .popup {
      position:fixed;
      top:50%; left:50%; transform:translate(-50%,-60%);
      background:rgba(255,255,255,0.96);
      backdrop-filter:blur(12px);
      border:2px solid #f06292;
      padding:16px 28px;
      border-radius:28px;
      color:#4a1a2e;
      font-weight:700;
      font-size:15px;
      z-index:999;
      opacity:0;
      pointer-events:none;
      transition:0.25s;
      box-shadow:0 16px 48px rgba(236,64,122,0.2);
      text-align:center;
      max-width:90%;
      font-family:'Quicksand',sans-serif;
    }
    .popup.show { opacity:1; transform:translate(-50%,-50%); }
    .popup.error { border-color:#ef5350; box-shadow:0 16px 48px rgba(239,83,80,0.2); }
  </style>
</head>
<body>

<div class="cute-bg">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
</div>

<div class="container">
  <div class="header">
    <img class="avatar" src="https://i.imgur.com/tEwTF7i.png" alt="avatar" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
    <span style="display:none;font-size:52px;line-height:1.2;animation:wiggle 3s infinite ease-in-out;">🤣</span>
    <div class="title"><span>FF PROXY</span></div>
    <div class="sub"><span>NGUYỄN TRUNG</span></div>
    <div class="divider"></div>
  </div>

  <div class="info-grid">
    <div>
      <div class="ig-label">📡 IP</div>
      <div class="ig-value" id="ip">...</div>
    </div>
    <div>
      <div class="ig-label">📱 DEVICE</div>
      <div class="ig-value" id="deviceId">...</div>
    </div>
  </div>

  <div class="note-box">
    <span class="icon">💡</span>
    <span>Duyệt IP + Device ID khi kích hoạt key nhé!</span>
  </div>

  <form id="requestForm" novalidate>
    <div class="field">
      <input id="license" placeholder="🔑 Nhập key của bạn..." inputmode="text" autocapitalize="none" autocomplete="off" required />
    </div>
    <div class="row">
      <button id="btnSubmit" class="btn" type="submit">Kích hoạt</button>
      <button id="btnClearKey" class="btn btn-clear" type="button" title="Xóa key">✕</button>
    </div>
  </form>

  <div id="statusPanel" class="status-panel">
    <div class="stat-title"><span id="statusIcon">✔️</span> <span id="statusTitle">KEY ACTIVE</span></div>
    <div id="statusIpMsg"></div>
    <div class="status-grid">
      <span class="sg-label">Trạng thái</span><span class="sg-value" id="sStatus">—</span>
      <span class="sg-label">Loại key</span><span class="sg-value" id="sType">—</span>
      <span class="sg-label">Kích hoạt</span><span class="sg-value" id="sCreated">—</span>
      <span class="sg-label">Hết hạn</span><span class="sg-value" id="sExpires">—</span>
    </div>
  </div>

  <div class="admin-box">
    <span class="admin-title">👩‍💻 Admin</span>
    <a class="admin-btn" target="_blank" href="https://t.me/vantrung23128">@vantrung23128</a>
  </div>

  <div class="footer">💕 NGUYEN TRUNG IOS • 2026 💕</div>
</div>

<div id="popup" class="popup"></div>

<script>
const ipEl = document.getElementById('ip');
const deviceIdEl = document.getElementById('deviceId');
const formEl = document.getElementById('requestForm');
const btnSubmit = document.getElementById('btnSubmit');
const btnClearKey = document.getElementById('btnClearKey');
const licenseInput = document.getElementById('license');
const popupEl = document.getElementById('popup');
const statusPanel = document.getElementById('statusPanel');
const SAVED_KEY = 'ff_cute_key_v5';

function loadSaved() {
  try { const v = localStorage.getItem(SAVED_KEY); if(v) licenseInput.value = v; } catch(e) {}
}
loadSaved();
function saveKey(k) { try { localStorage.setItem(SAVED_KEY,k); } catch(e) {} }

function showPopup(text, isError=false) {
  popupEl.textContent = text;
  popupEl.className = 'popup show' + (isError ? ' error' : '');
  clearTimeout(window._pt);
  window._pt = setTimeout(() => { popupEl.classList.remove('show'); }, 3800);
}

async function sha256(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function getFingerprintParts() {
  const n=navigator||{}, s=window.screen||{}, tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'';
  return [n.userAgent||'', n.platform||'', n.vendor||'', n.language||'', (n.languages||[]).join(','),
          String(n.hardwareConcurrency||''), String(n.deviceMemory||''), String(n.maxTouchPoints||''),
          String(s.width||''), String(s.height||''), String(s.colorDepth||''),
          String(window.devicePixelRatio||''), tz, navigator.plugins.length || ''].join('|');
}

async function getDeviceId() {
  const key='device_fp_v6';
  let id = localStorage.getItem(key);
  if(id) { deviceIdEl.textContent = id; return id; }
  try {
    const raw = getFingerprintParts();
    const hash = await sha256(raw);
    id = 'DEV-'+hash.slice(0,36).toUpperCase();
    localStorage.setItem(key,id);
    deviceIdEl.textContent = id;
    return id;
  } catch(e) {
    id = 'DEV-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,5).toUpperCase();
    localStorage.setItem(key,id);
    deviceIdEl.textContent = id;
    return id;
  }
}

async function getIP() {
  try {
    const r = await fetch('/whoami');
    const d = await r.json();
    if(d && d.ip) { ipEl.textContent=d.ip; return d.ip; }
  } catch(e) {}
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const d = await r.json();
    ipEl.textContent=d.ip||'N/A';
    return d.ip;
  } catch(e) {
    ipEl.textContent='N/A';
    return null;
  }
}

let currentIP = null;
let currentDeviceId = null;
Promise.all([getIP(), getDeviceId()]).then(([ip, dev]) => {
  currentIP = ip;
  currentDeviceId = dev;
});

async function loadKeyStatus(key) {
  if(!key) { statusPanel.style.display='none'; return; }
  try {
    const r = await fetch('/api/key-status?key='+encodeURIComponent(key));
    const d = await r.json();
    statusPanel.style.display='block';
    const now = Math.floor(Date.now()/1000);
    const expired = d.expires_at && d.expires_at < now;
    const titleEl = document.getElementById('statusTitle');
    const iconEl = document.getElementById('statusIcon');
    if(expired) {
      titleEl.textContent = 'KEY HẾT HẠN 💔';
      titleEl.style.color='#ef5350';
      iconEl.textContent='💔';
    } else {
      titleEl.textContent = 'KEY ACTIVE 💖';
      titleEl.style.color='#6a1b4d';
      iconEl.textContent='💖';
    }
    document.getElementById('sStatus').textContent = expired ? 'Hết hạn' : (d.active ? (d.ip_whitelisted ? 'Hoạt động' : 'Chờ IP') : 'Chưa kích hoạt');
    document.getElementById('sType').textContent = d.key_type || '—';
    document.getElementById('sCreated').textContent = d.created_at ? new Date(d.created_at).toLocaleString('vi-VN') : '—';
    document.getElementById('sExpires').textContent = d.expires_at ? new Date(d.expires_at*1000).toLocaleString('vi-VN') : 'Không giới hạn';
    const ipMsg = document.getElementById('statusIpMsg');
    if(d.ip_whitelisted) { ipMsg.textContent='✅ IP + Device đã active'; ipMsg.style.color='#43a047'; }
    else if(d.active) { ipMsg.textContent='⚠️ Cần active IP & Device'; ipMsg.style.color='#f9a825'; }
    else { ipMsg.textContent=''; }
  } catch(e) {
    statusPanel.style.display='none';
  }
}

const savedKey = (()=>{ try{return localStorage.getItem(SAVED_KEY);}catch(e){return null;} })();
if(savedKey) loadKeyStatus(savedKey);

btnClearKey.addEventListener('click', ()=>{
  try{ localStorage.removeItem(SAVED_KEY); }catch(e){}
  licenseInput.value='';
  statusPanel.style.display='none';
  showPopup('Đã xóa key 🧹', false);
});

formEl.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const key = licenseInput.value.trim();
  if(!key) { showPopup('🌸 Nhập key vào nha!', true); return; }
  if(!currentIP) { showPopup('📡 Không lấy được IP', true); return; }
  if(!currentDeviceId) { showPopup('📱 Không lấy được Device', true); return; }
  btnSubmit.disabled = true;
  try {
    const body = { ip: currentIP, key, device_id: currentDeviceId };
    const r = await fetch('/submit', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const d = await r.json();
    if(r.ok) {
      saveKey(key);
      showPopup('✨ Thành công rồi nè! ✨', false);
      loadKeyStatus(key);
    } else {
      showPopup(d.message || '💔 Key không đúng', true);
    }
  } catch(err) {
    showPopup('💔 Key Sai', true);
  } finally {
    btnSubmit.disabled = false;
  }
});
</script>
</body>
</html>
